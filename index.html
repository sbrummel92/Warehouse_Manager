<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4f8ef7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WH Logger">
<meta name="description" content="Log and track product locations in your warehouse">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Warehouse Logger</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #22263a;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #2ecc71;
    --red: #e74c3c;
    --text: #f0f2ff;
    --muted: #8b90a7;
    --border: #2e3347;
    --radius: 14px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: calc(70px + var(--safe-bottom));
    overscroll-behavior: none;
  }

  /* Install banner */
  #installBanner {
    display: none;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #1a1d27, #22263a);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 13px;
  }
  #installBanner.show { display: flex; }
  #installBanner .install-icon { font-size: 22px; flex-shrink: 0; }
  #installBanner .install-text { flex: 1; line-height: 1.4; }
  #installBanner .install-text strong { color: var(--accent); display: block; font-size: 13px; }
  #installBanner .install-text span { color: var(--muted); font-size: 11px; }
  #installBanner .install-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
  }
  #installBanner .dismiss-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    flex-shrink: 0;
    padding: 0 2px;
  }

  /* Offline badge */
  #offlineBadge {
    display: none;
    background: #e74c3c;
    color: white;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    padding: 4px;
    letter-spacing: 0.5px;
  }
  #offlineBadge.show { display: block; }

  header {
    background: linear-gradient(135deg, #1a1d27 0%, #22263a 100%);
    padding: 16px 16px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }
  header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .stats-row { display: flex; gap: 8px; padding: 12px 16px; }
  .stat-chip {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-chip .val { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-chip .lbl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
  }
  nav button {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    padding: 12px 0;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; padding: 16px; }
  .tab-content.active { display: block; }

  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  .form-card h2 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input, .field textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 16px; /* 16px prevents iOS zoom */
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: none; height: 72px; font-size: 16px; }

  .location-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
  .btn-danger-full {
    background: none;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 12px;
    font-size: 14px;
    border-radius: 10px;
  }

  .search-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: var(--text);
    font-size: 16px;
    width: 100%;
    outline: none;
    margin-bottom: 10px;
    -webkit-appearance: none;
    appearance: none;
  }
  .search-bar:focus { border-color: var(--accent); }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    -webkit-user-select: none;
    user-select: none;
  }
  .filter-chip.active {
    background: rgba(79,142,247,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .log-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    position: relative;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .log-item .product-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; padding-right: 44px; }
  .log-item .location-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(79,142,247,0.12);
    color: var(--accent);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .log-item .meta-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .log-item .meta { font-size: 12px; color: var(--muted); }
  .log-item .meta strong { color: var(--text); }
  .log-item .notes {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-style: italic;
  }
  .del-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 5px 9px;
    font-size: 13px;
    border-radius: 8px;
    cursor: pointer;
    line-height: 1;
  }

  .empty-state { text-align: center; padding: 48px 16px; color: var(--muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .export-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
    text-align: left;
    transition: border-color 0.2s;
    display: block;
  }
  .export-btn:active { border-color: var(--accent); color: var(--accent); }

  .toast {
    position: fixed;
    bottom: calc(80px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: white;
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- Offline indicator -->
<div id="offlineBadge">⚡ OFFLINE MODE — data is saved locally</div>

<!-- Install banner -->
<div id="installBanner">
  <div class="install-icon">📦</div>
  <div class="install-text">
    <strong>Install Warehouse Logger</strong>
    <span>Add to home screen for offline use</span>
  </div>
  <button class="install-btn" id="installBtn">Install</button>
  <button class="dismiss-btn" id="dismissBtn">✕</button>
</div>

<header>
  <h1>📦 Warehouse <span>Logger</span></h1>
  <p id="headerDate"></p>
</header>

<div class="stats-row">
  <div class="stat-chip">
    <div class="val" id="statTotal">0</div>
    <div class="lbl">Entries</div>
  </div>
  <div class="stat-chip">
    <div class="val" id="statAisles">0</div>
    <div class="lbl">Aisles</div>
  </div>
  <div class="stat-chip">
    <div class="val" id="statQty">0</div>
    <div class="lbl">Total Qty</div>
  </div>
</div>

<nav>
  <button class="active" onclick="switchTab('log')">➕ Log</button>
  <button onclick="switchTab('view')">📋 View</button>
  <button onclick="switchTab('export')">📤 Export</button>
</nav>

<!-- LOG TAB -->
<div class="tab-content active" id="tab-log">
  <div class="form-card">
    <h2>Product Info</h2>
    <div class="field">
      <label>Product Name / ID *</label>
      <input type="text" id="productName" placeholder="e.g. SKU-1042 or Blue Widget" autocomplete="off" autocorrect="off" autocapitalize="words" />
    </div>
    <div class="field">
      <label>Quantity</label>
      <input type="number" id="productQty" placeholder="0" min="0" inputmode="numeric" />
    </div>
  </div>

  <div class="form-card">
    <h2>Location</h2>
    <div class="location-row">
      <div class="field">
        <label>Aisle</label>
        <input type="text" id="locAisle" placeholder="A3" autocomplete="off" autocorrect="off" autocapitalize="characters" />
      </div>
      <div class="field">
        <label>Shelf</label>
        <input type="text" id="locShelf" placeholder="S2" autocomplete="off" autocorrect="off" autocapitalize="characters" />
      </div>
      <div class="field">
        <label>Bin</label>
        <input type="text" id="locBin" placeholder="B01" autocomplete="off" autocorrect="off" autocapitalize="characters" />
      </div>
    </div>
  </div>

  <div class="form-card">
    <h2>Notes</h2>
    <div class="field">
      <textarea id="productNotes" placeholder="Damage notes, special handling, expiry info..."></textarea>
    </div>
  </div>

  <button class="btn btn-primary" onclick="saveEntry()">✅ Save Entry</button>
</div>

<!-- VIEW TAB -->
<div class="tab-content" id="tab-view">
  <input class="search-bar" type="search" placeholder="🔍 Search by name, ID, or location..." oninput="renderLog()" id="searchInput" />
  <div class="filter-row" id="aisleFilters"></div>
  <div id="logList"></div>
</div>

<!-- EXPORT TAB -->
<div class="tab-content" id="tab-export">
  <div class="form-card">
    <h2>Export Data</h2>
    <button class="export-btn" onclick="exportCSV()">📄 Export as CSV</button>
    <button class="export-btn" onclick="exportJSON()">🗂️ Export as JSON</button>
    <button class="export-btn" onclick="copyToClipboard()">📋 Copy to Clipboard</button>
  </div>
  <div class="form-card">
    <h2>Danger Zone</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Permanently deletes all logged entries from this device.</p>
    <button class="btn btn-danger-full" onclick="clearAll()">🗑️ Clear All Data</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Service Worker registration ──────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.warn('SW registration failed:', err);
      });
    });
  }

  // ── PWA Install prompt ───────────────────────────────────────────────────
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    if (!localStorage.getItem('installDismissed')) {
      document.getElementById('installBanner').classList.add('show');
    }
  });

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
    if (outcome === 'accepted') showToast('🎉 App installed!');
  });

  document.getElementById('dismissBtn').addEventListener('click', () => {
    document.getElementById('installBanner').classList.remove('show');
    localStorage.setItem('installDismissed', '1');
  });

  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').classList.remove('show');
    showToast('🎉 Installed successfully!');
  });

  // ── Offline / online detection ───────────────────────────────────────────
  function updateOnlineStatus() {
    const badge = document.getElementById('offlineBadge');
    if (navigator.onLine) badge.classList.remove('show');
    else badge.classList.add('show');
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  // ── App logic ────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'wh_log_v1';
  let entries = [];
  let activeAisle = 'All';

  function load() {
    try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { entries = []; }
  }

  function persist() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function showToast(msg, color = '#2ecc71') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.querySelectorAll('nav button')[['log','view','export'].indexOf(name)].classList.add('active');
    if (name === 'view') renderLog();
  }

  function saveEntry() {
    const name = document.getElementById('productName').value.trim();
    if (!name) { showToast('⚠️ Product name required', '#e74c3c'); return; }

    const entry = {
      id: Date.now(),
      name,
      qty: document.getElementById('productQty').value.trim() || '—',
      aisle: document.getElementById('locAisle').value.trim().toUpperCase(),
      shelf: document.getElementById('locShelf').value.trim().toUpperCase(),
      bin: document.getElementById('locBin').value.trim().toUpperCase(),
      notes: document.getElementById('productNotes').value.trim(),
      ts: new Date().toISOString()
    };

    entries.unshift(entry);
    persist();
    updateStats();
    showToast('✅ Entry saved!');
    ['productName','productQty','locAisle','locShelf','locBin','productNotes']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('productName').focus();
  }

  function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    entries = entries.filter(e => e.id !== id);
    persist(); updateStats(); renderLog();
    showToast('🗑️ Deleted', '#e74c3c');
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = entries.length;
    document.getElementById('statAisles').textContent =
      new Set(entries.map(e => e.aisle).filter(Boolean)).size;
    document.getElementById('statQty').textContent =
      entries.reduce((s, e) => s + (parseFloat(e.qty) || 0), 0);
  }

  function locStr(e) {
    const parts = [e.aisle, e.shelf, e.bin].filter(Boolean);
    return parts.length ? parts.join(' › ') : 'No location set';
  }

  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short' }) +
      ' ' + d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }

  function renderLog() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    const aisles = ['All', ...new Set(entries.map(e => e.aisle).filter(Boolean))];

    document.getElementById('aisleFilters').innerHTML = aisles.map(a =>
      `<div class="filter-chip ${a === activeAisle ? 'active' : ''}" onclick="setAisle('${a}')">${a || 'No Aisle'}</div>`
    ).join('');

    let filtered = entries;
    if (activeAisle !== 'All') filtered = filtered.filter(e => e.aisle === activeAisle);
    if (q) filtered = filtered.filter(e =>
      e.name.toLowerCase().includes(q) || locStr(e).toLowerCase().includes(q)
    );

    const list = document.getElementById('logList');
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${
        entries.length ? 'No entries match your search' : 'No entries yet — start logging!'
      }</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(e => `
      <div class="log-item">
        <button class="del-btn" onclick="deleteEntry(${e.id})">✕</button>
        <div class="product-name">${escHtml(e.name)}</div>
        <div class="location-badge">📍 ${locStr(e)}</div>
        <div class="meta-row">
          <span class="meta">Qty: <strong>${escHtml(e.qty)}</strong></span>
          <span class="meta">${fmtDate(e.ts)}</span>
        </div>
        ${e.notes ? `<div class="notes">${escHtml(e.notes)}</div>` : ''}
      </div>`).join('');
  }

  function setAisle(a) { activeAisle = a; renderLog(); }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function exportCSV() {
    const header = ['Product','Quantity','Aisle','Shelf','Bin','Notes','Timestamp'];
    const rows = entries.map(e => [e.name, e.qty, e.aisle, e.shelf, e.bin, e.notes, e.ts]);
    const csv = [header, ...rows]
      .map(r => r.map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','))
      .join('\n');
    dl('warehouse_log.csv', csv, 'text/csv');
  }

  function exportJSON() {
    dl('warehouse_log.json', JSON.stringify(entries, null, 2), 'application/json');
  }

  function dl(name, content, type) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], {type}));
    a.download = name;
    a.click();
    showToast('📥 Downloading…');
  }

  function copyToClipboard() {
    const text = entries.map(e =>
      `${e.name} | ${locStr(e)} | Qty: ${e.qty}${e.notes ? ' | '+e.notes : ''}`
    ).join('\n');
    navigator.clipboard.writeText(text)
      .then(() => showToast('📋 Copied to clipboard!'))
      .catch(() => showToast('⚠️ Copy failed — try export', '#e74c3c'));
  }

  function clearAll() {
    if (!confirm('Delete ALL entries? This cannot be undone.')) return;
    entries = []; persist(); updateStats(); renderLog();
    showToast('🗑️ All data cleared', '#e74c3c');
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  load();
  updateStats();
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // Handle deep link to tab via hash
  const hash = location.hash.replace('#','');
  if (['log','view','export'].includes(hash)) switchTab(hash);
</script>
</body>
</html>
